<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" role="img" aria-label="A cartoon rainbow with two happy sisters holding handmade bracelets">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF6FF" />
      <stop offset="1" stop-color="#FFF6FB" />
    </linearGradient>
    <linearGradient id="dressA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A471FF" />
      <stop offset="1" stop-color="#8B4DFF" />
    </linearGradient>
    <linearGradient id="dressB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#76BCFF" />
      <stop offset="1" stop-color="#46A1FF" />
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="900" height="640" rx="40" fill="url(#sky)" />

  <!-- sun -->
  <g transform="translate(792 118)">
    <g stroke="#FFD12E" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="-66" x2="0" y2="-50" />
      <line x1="47" y1="-47" x2="35" y2="-35" />
      <line x1="66" y1="0" x2="50" y2="0" />
      <line x1="-47" y1="-47" x2="-35" y2="-35" />
      <line x1="-66" y1="0" x2="-50" y2="0" />
    </g>
    <circle r="40" fill="#FFDD5C" />
  </g>

  <!-- rainbow -->
  <g fill="none" stroke-linecap="round" stroke-width="26">
    <path d="M90 600 A360 360 0 0 1 810 600" stroke="#FF4D97" />
    <path d="M116 600 A334 334 0 0 1 784 600" stroke="#FF8E3C" />
    <path d="M142 600 A308 308 0 0 1 758 600" stroke="#FFD12E" />
    <path d="M168 600 A282 282 0 0 1 732 600" stroke="#7BD88F" />
    <path d="M194 600 A256 256 0 0 1 706 600" stroke="#46A1FF" />
    <path d="M220 600 A230 230 0 0 1 680 600" stroke="#8B4DFF" />
  </g>

  <!-- soft hill -->
  <ellipse cx="450" cy="650" rx="540" ry="95" fill="#FFF1F7" />

  <!-- clouds -->
  <g fill="#FFFFFF">
    <g transform="translate(196 520)">
      <circle cx="-40" cy="6" r="30" /><circle cx="0" cy="-12" r="38" /><circle cx="42" cy="4" r="32" />
      <rect x="-66" y="0" width="130" height="34" rx="17" />
    </g>
    <g transform="translate(706 516)">
      <circle cx="-42" cy="6" r="32" /><circle cx="2" cy="-12" r="40" /><circle cx="44" cy="4" r="30" />
      <rect x="-70" y="0" width="138" height="34" rx="17" />
    </g>
  </g>

  <!-- sparkles, hearts & flowers -->
  <g>
    <g transform="translate(450 150)" fill="#FFD12E"><path d="M10 0C11.5 6.5 13.5 8.5 20 10C13.5 11.5 11.5 13.5 10 20C8.5 13.5 6.5 11.5 0 10C6.5 8.5 8.5 6.5 10 0Z"/></g>
    <g transform="translate(300 120) scale(0.8)" fill="#8B4DFF"><path d="M10 0C11.5 6.5 13.5 8.5 20 10C13.5 11.5 11.5 13.5 10 20C8.5 13.5 6.5 11.5 0 10C6.5 8.5 8.5 6.5 10 0Z"/></g>
    <g transform="translate(600 210) scale(0.7)" fill="#46A1FF"><path d="M10 0C11.5 6.5 13.5 8.5 20 10C13.5 11.5 11.5 13.5 10 20C8.5 13.5 6.5 11.5 0 10C6.5 8.5 8.5 6.5 10 0Z"/></g>

    <g transform="translate(168 250) scale(1.1)" fill="#FF4D97"><path d="M12 21c-4.2-3-7-5.4-7-9a4 4 0 0 1 7-2.6A4 4 0 0 1 19 12c0 3.6-2.8 6-7 9z"/></g>
    <g transform="translate(690 300)" fill="#FF6FAD"><path d="M12 21c-4.2-3-7-5.4-7-9a4 4 0 0 1 7-2.6A4 4 0 0 1 19 12c0 3.6-2.8 6-7 9z"/></g>

    <g transform="translate(250 360)">
      <g fill="#FFC2DD"><circle cx="0" cy="-11" r="8"/><circle cx="11" cy="-3" r="8"/><circle cx="7" cy="10" r="8"/><circle cx="-7" cy="10" r="8"/><circle cx="-11" cy="-3" r="8"/></g>
      <circle cx="0" cy="0" r="6" fill="#FFD12E"/>
    </g>
    <g transform="translate(650 410) scale(0.9)">
      <g fill="#D4BBFF"><circle cx="0" cy="-11" r="8"/><circle cx="11" cy="-3" r="8"/><circle cx="7" cy="10" r="8"/><circle cx="-7" cy="10" r="8"/><circle cx="-11" cy="-3" r="8"/></g>
      <circle cx="0" cy="0" r="6" fill="#FFD12E"/>
    </g>
  </g>

  <!-- Girl A (purple dress) -->
  <g>
    <ellipse cx="330" cy="556" rx="18" ry="7" fill="#E63385" />
    <path d="M330 480 L302 552 Q300 558 306 558 L354 558 Q360 558 358 552 Z" fill="url(#dressA)" />
    <line x1="312" y1="494" x2="300" y2="524" stroke="#FFE3D0" stroke-width="9" stroke-linecap="round" />
    <line x1="350" y1="490" x2="374" y2="462" stroke="#FFE3D0" stroke-width="9" stroke-linecap="round" />
    <!-- bracelet in raised hand -->
    <circle cx="382" cy="456" r="11" fill="none" stroke="#FF4D97" stroke-width="5" />
    <circle cx="382" cy="445" r="2.6" fill="#FFD12E" /><circle cx="393" cy="456" r="2.6" fill="#46A1FF" /><circle cx="382" cy="467" r="2.6" fill="#8B4DFF" />
    <!-- head -->
    <circle cx="330" cy="442" r="33" fill="#9A6A43" />
    <circle cx="300" cy="446" r="15" fill="#9A6A43" /><circle cx="360" cy="446" r="15" fill="#9A6A43" />
    <circle cx="300" cy="446" r="6" fill="#FF6FAD" /><circle cx="360" cy="446" r="6" fill="#FF6FAD" />
    <circle cx="330" cy="450" r="29" fill="#FFE3D0" />
    <circle cx="320" cy="450" r="3.2" fill="#5B3A2E" /><circle cx="340" cy="450" r="3.2" fill="#5B3A2E" />
    <circle cx="315" cy="459" r="4" fill="#FF9CC6" /><circle cx="345" cy="459" r="4" fill="#FF9CC6" />
    <path d="M322 460 q8 7 16 0" fill="none" stroke="#C25B7A" stroke-width="2.4" stroke-linecap="round" />
    <!-- bow -->
    <g transform="translate(330 414)" fill="#FF4D97"><path d="M0 0 L-12 -7 L-12 7 Z"/><path d="M0 0 L12 -7 L12 7 Z"/><circle r="3.4"/></g>
  </g>

  <!-- Girl B (blue dress) -->
  <g>
    <ellipse cx="575" cy="556" rx="18" ry="7" fill="#0F6BD6" />
    <path d="M575 480 L547 552 Q545 558 551 558 L599 558 Q605 558 603 552 Z" fill="url(#dressB)" />
    <line x1="557" y1="490" x2="533" y2="462" stroke="#FFE3D0" stroke-width="9" stroke-linecap="round" />
    <line x1="595" y1="494" x2="607" y2="524" stroke="#FFE3D0" stroke-width="9" stroke-linecap="round" />
    <!-- bracelet in raised hand -->
    <circle cx="525" cy="456" r="11" fill="none" stroke="#8B4DFF" stroke-width="5" />
    <circle cx="525" cy="445" r="2.6" fill="#FF4D97" /><circle cx="514" cy="456" r="2.6" fill="#FFD12E" /><circle cx="525" cy="467" r="2.6" fill="#46A1FF" />
    <!-- head with longer hair -->
    <circle cx="575" cy="442" r="34" fill="#F4CE73" />
    <rect x="543" y="440" width="13" height="56" rx="6.5" fill="#F4CE73" />
    <rect x="594" y="440" width="13" height="56" rx="6.5" fill="#F4CE73" />
    <circle cx="575" cy="450" r="29" fill="#FFE3D0" />
    <circle cx="565" cy="450" r="3.2" fill="#5B3A2E" /><circle cx="585" cy="450" r="3.2" fill="#5B3A2E" />
    <circle cx="560" cy="459" r="4" fill="#FF9CC6" /><circle cx="590" cy="459" r="4" fill="#FF9CC6" />
    <path d="M567 460 q8 7 16 0" fill="none" stroke="#C25B7A" stroke-width="2.4" stroke-linecap="round" />
    <!-- bow -->
    <g transform="translate(575 412)" fill="#46A1FF"><path d="M0 0 L-12 -7 L-12 7 Z"/><path d="M0 0 L12 -7 L12 7 Z"/><circle r="3.4"/></g>
  </g>
</svg>
